repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff-check
        args: [src/, tests/, --fix]
        always_run: true
        pass_filenames: false
        types_or: [python, pyi]
      - id: ruff-format
        args: [src/, tests/]
        always_run: true
        pass_filenames: false
        types_or: [python, pyi]

  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: uv run ty check src/ tests/
        always_run: true
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
